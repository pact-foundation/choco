name: Release

on:
  workflow_dispatch:
  repository_dispatch:
    types: [ choco-package-release ]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout Bucket
        uses: actions/checkout@main

      - name: Pack and upload only newer packages
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'

          function Get-VersionParts {
            param([string]$Value)
            if ([string]::IsNullOrWhiteSpace($Value)) { return @() }
            return @($Value -split '[^0-9]+' | Where-Object { $_ -ne '' } | ForEach-Object { [int]$_ })
          }

          function Compare-Version {
            param(
              [string]$Left,
              [string]$Right
            )

            try {
              return ([version]$Left).CompareTo([version]$Right)
            }
            catch {
              $leftParts = Get-VersionParts $Left
              $rightParts = Get-VersionParts $Right
              $max = [Math]::Max($leftParts.Count, $rightParts.Count)
              for ($i = 0; $i -lt $max; $i++) {
                $l = if ($i -lt $leftParts.Count) { $leftParts[$i] } else { 0 }
                $r = if ($i -lt $rightParts.Count) { $rightParts[$i] } else { 0 }
                if ($l -gt $r) { return 1 }
                if ($l -lt $r) { return -1 }
              }
              return 0
            }
          }

          $assets = gh release view choco --repo "$env:GITHUB_REPOSITORY" --json assets --jq '.assets[].name'
          $assetNames = @()
          if ($assets) {
            $assetNames = $assets -split "`n" | Where-Object { -not [string]::IsNullOrWhiteSpace($_) }
          }

          $nuspecFiles = Get-ChildItem -Path . -Filter '*.nuspec' -File
          if (-not $nuspecFiles) {
            Write-Host 'No .nuspec files found.'
            exit 0
          }

          foreach ($nuspec in $nuspecFiles) {
            [xml]$xml = Get-Content -Path $nuspec.FullName
            $id = $xml.package.metadata.id
            $version = $xml.package.metadata.version

            if ([string]::IsNullOrWhiteSpace($id) -or [string]::IsNullOrWhiteSpace($version)) {
              Write-Warning "Skipping $($nuspec.Name): missing id or version in nuspec metadata"
              continue
            }

            $matchingVersions = @()
            $pattern = "^" + [Regex]::Escape($id) + "\.([^.]+(?:\.[^.]+)*)\.nupkg$"
            foreach ($asset in $assetNames) {
              if ($asset -match $pattern) {
                $matchingVersions += $Matches[1]
              }
            }

            $latestReleasedVersion = $null
            foreach ($existingVersion in $matchingVersions) {
              if ($null -eq $latestReleasedVersion -or (Compare-Version $existingVersion $latestReleasedVersion) -gt 0) {
                $latestReleasedVersion = $existingVersion
              }
            }

            $shouldPublish = $false
            if ($null -eq $latestReleasedVersion) {
              $shouldPublish = $true
            }
            elseif ((Compare-Version $version $latestReleasedVersion) -gt 0) {
              $shouldPublish = $true
            }

            if (-not $shouldPublish) {
              Write-Host "Skipping $id $version (latest released: $latestReleasedVersion)"
              continue
            }

            Write-Host "Packing and publishing $id $version"
            choco pack "$($nuspec.FullName)"

            $packageAsset = "$id.$version.nupkg"
            if (-not (Test-Path $packageAsset)) {
              throw "Expected package file not found: $packageAsset"
            }

            gh release upload choco "$packageAsset" --repo "$env:GITHUB_REPOSITORY" --clobber
          }
